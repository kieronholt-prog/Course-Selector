  // Calls our own Cloudflare Worker which:
  //   - Holds the Admiralty API key server-side (not exposed in browser)
  //   - Caches responses for 6 hours (saves API quota, faster on repeat loads)
  //   - Works on mobile data (no carrier header-stripping)
  // IMPORTANT: replace TIDAL_WORKER_URL below with your Worker URL after deploying.
  // It will look like: https://wsc-tidal-proxy.YOUR-NAME.workers.dev
  const WORKER_URL = 'https://wsc-tidal-proxy.kieronholt.workers.dev';

  // Warsash secondary port corrections (Reeds Almanac / UKHO):
  //   Southampton (Dock Head) station 0062 is the standard port.
  //   Warsash is ~4nm south: HW +13 min, LW +3 min
  const HW_CORR=13*60000, LW_CORR=3*60000;

  const url=WORKER_URL+'?station='+ADMIRALTY_STATION+'&duration=3';
  const r=await fetch(url);
  if(!r.ok){
    const txt=await r.text().catch(function(){return '';});
    throw new Error('Tidal Worker '+r.status+': '+txt.slice(0,120));
  }
  const data=await r.json();
  if(!Array.isArray(data)){throw new Error('Unexpected tidal response format');}
  return data.map(function(e){
    const corr=e.EventType==='HighWater'?HW_CORR:LW_CORR;
    // Admiralty DateTime is UTC but omits the Z suffix — append it to force correct parsing
    return{time:new Date(new Date(e.DateTime+'Z').getTime()+corr),type:e.EventType,height:e.Height};
  });
}

async function fetchOpenMeteoWind(){
  // ukmo_seamless = UKV 2km (days 1-2) blended with UKMO Global 10km (days 3+).
  // This is the correct model= parameter for /v1/forecast.
  // wind_speed_unit=kn returns knots directly — no conversion needed.
  const url='https://api.open-meteo.com/v1/forecast?latitude='+FC_LAT+'&longitude='+FC_LON
    +'&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,weather_code'
    +'&wind_speed_unit=kn&timezone=Europe%2FLondon&forecast_days=7&models=ukmo_seamless';
  const r=await fetch(url);
  if(!r.ok){
    const txt=await r.text().catch(function(){return '';});
    throw new Error('Wind API '+r.status+': '+txt.slice(0,120));
  }
  const data=await r.json();
  if(data.error){throw new Error('Wind API: '+data.reason);}
  const lkp={};
  data.hourly.time.forEach(function(t,i){
    lkp[t]={
      spd:data.hourly.wind_speed_10m[i],
      dir:data.hourly.wind_direction_10m[i],
      gust:data.hourly.wind_gusts_10m[i],
      wx:data.hourly.weather_code?data.hourly.weather_code[i]:null
    };
  });
  return lkp;
}

function gustClass(gKts){
  if(gKts===null) return '';
  if(gKts<8) return 'gust-light';
  if(gKts<16) return 'gust-mod';
  if(gKts<22) return 'gust-fresh';
  if(gKts<30) return 'gust-strong';
  return 'gust-very-strong';
}
function gustRowClass(gKts){
  if(gKts===null||gKts<8) return '';
  if(gKts<16) return 'gust-row-mod';
  if(gKts<22) return 'gust-row-fresh';
  if(gKts<30) return 'gust-row-strong';
  return 'gust-row-very-strong';
}

var fcTideEvents=[];
var fcStartData=null;

function scrollMidRowToCenter(){
  var wrap=document.getElementById('fc-table-wrap');
  var row=document.getElementById('fc-mid-row');
  if(!wrap||!row)return;
  var wrapH=wrap.clientHeight;
  var rowTop=row.offsetTop;
  var rowH=row.offsetHeight;
  // Scroll so the row is centred in the visible area
  wrap.scrollTop=rowTop-(wrapH/2)+(rowH/2);
}

// Snap back to highlighted row centre when scroll stops
(function(){
  var wrap=document.getElementById('fc-table-wrap');
  if(!wrap)return;
  var snapTimer=null;
  var userScrolled=false;

  function onScrollEnd(){
    snapTimer=null;
    if(!userScrolled)return;
    userScrolled=false;
    scrollMidRowToCenter();
  }

  wrap.addEventListener('touchstart',function(){
    userScrolled=false;
    if(snapTimer){clearTimeout(snapTimer);snapTimer=null;}
  },{passive:true});

  wrap.addEventListener('touchmove',function(){
    userScrolled=true;
    if(snapTimer){clearTimeout(snapTimer);snapTimer=null;}
  },{passive:true});

  wrap.addEventListener('touchend',function(){
    if(!userScrolled)return;
    // Wait for momentum scroll to settle, then snap
    snapTimer=setTimeout(onScrollEnd,600);
  },{passive:true});

  // Mouse scroll fallback
  wrap.addEventListener('scroll',function(){
    userScrolled=true;
    if(snapTimer)clearTimeout(snapTimer);
    snapTimer=setTimeout(function(){
      userScrolled=false;
      scrollMidRowToCenter();
    },700);
  },{passive:true});
})();

async function fetchModelMeta(){
  // Try to get the actual last availability time from Open-Meteo metadata API
  try{
    const r=await fetch('https://api.open-meteo.com/data/ukmo_seamless/status.json');
    if(r.ok){
      const d=await r.json();
      // last_run_availability_time is a Unix timestamp in seconds
      const avail=d.last_run_availability_time;
      if(avail){
        const availDate=new Date(avail*1000);
        const offset=getUKOffset(availDate);
        const local=new Date(availDate.getTime()+offset*3600000);
        const hh=String(local.getUTCHours()).padStart(2,'0');
        const mm=String(local.getUTCMinutes()).padStart(2,'0');
        return{runLabel:hh+':'+mm};
      }
    }
  }catch(e){}
  // Fallback: calculate from clock
  const now=new Date();
  const offset=getUKOffset(now);
  const ukH=(now.getUTCHours()+offset)%24;
  const runH=Math.floor(Math.max(0,ukH-4)/6)*6;
  const localRunH=(runH+offset)%24;
  return{runLabel:String(localRunH).padStart(2,'0')+':00'};
}
// Dynamic wind arrow SVG generator — supports any degree, colour-coded by trend
function makeWindArrow(deg, color){
  color=color||'#e8a020';
  const cx=14,cy=14,r=11;
  const rad=deg*Math.PI/180;
  // Tail at "from" direction, head at "to" direction
  const tx=+(cx+r*Math.sin(rad)).toFixed(2), ty=+(cy-r*Math.cos(rad)).toFixed(2);
  const ex=+(cx-r*Math.sin(rad)).toFixed(2), ey=+(cy+r*Math.cos(rad)).toFixed(2);
  // Arrowhead geometry (length 7, half-width 4)
  const ddx=ex-tx,ddy=ey-ty,dist=Math.sqrt(ddx*ddx+ddy*ddy);
  const ux=ddx/dist,uy=ddy/dist,vx=-uy,vy=ux,hl=7,hw=4;
  const hx=+(ex-ux*hl).toFixed(2),hy=+(ey-uy*hl).toFixed(2);
  const p1x=+(hx+vx*hw).toFixed(2),p1y=+(hy+vy*hw).toFixed(2);
  const p2x=+(hx-vx*hw).toFixed(2),p2y=+(hy-vy*hw).toFixed(2);
  // Semi-transparent fill for tail circle matches arrow colour
  const alpha=color==='#4ec87a'?'rgba(78,200,122,0.35)':color==='#e05050'?'rgba(224,80,80,0.35)':'rgba(232,160,32,0.35)';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">`+
    `<line x1="${tx}" y1="${ty}" x2="${ex}" y2="${ey}" stroke="${color}" stroke-width="2.2" stroke-linecap="round"/>`+
    `<polygon points="${ex},${ey} ${p1x},${p1y} ${p2x},${p2y}" fill="${color}"/>`+
    `<circle cx="${tx}" cy="${ty}" r="2.2" fill="${alpha}" stroke="${color}" stroke-width="1"/>`+
    `</svg>`;
}

function wmoSymbol(code){
  if(code===null||code===undefined) return '—';
  if(code===0)  return '☀';   // Clear sun
  if(code<=2)   return '⛅';  // Partly cloudy
  if(code===3)  return '☁';  // Overcast
  if(code<=48)  return '♨';  // Fog (hot springs = mist)
  if(code<=55)  return '☂';  // Drizzle
  if(code<=67)  return '☔';  // Rain
  if(code<=77)  return '❅';  // Snow
  if(code<=82)  return '☔';  // Showers
  if(code<=86)  return '☆';  // Snow showers
  return '⚡';                 // Thunder
}
async function runForecast(){
  const dateVal=document.getElementById('fc-date').value;
  const timeVal=document.getElementById('fc-time').value;
  const durationVal=parseInt(document.getElementById('fc-duration').value)||70;
  if(!dateVal||!timeVal)return;
  document.getElementById('fc-loading').style.display='block';
  document.getElementById('fc-table-wrap').style.display='none';
    var hdr2=document.querySelector('.fc-tbl-hdr');if(hdr2)hdr2.style.display='none';
  document.getElementById('fc-error').style.display='none';
  document.getElementById('fc-next-btn').disabled=true;
  fcStartData=null;
  try{
    const startTime=new Date(dateVal+'T'+timeVal+':00');
    // Midpoint = start + duration/2, snapped to nearest hour
    const midMs=startTime.getTime()+durationVal*30000; // +duration/2 minutes in ms
    const midHour=new Date(midMs); midHour.setMinutes(0,0,0);
    // Show 5 rows centred around midHour: midHour-2h to midHour+2h
    const startHour=new Date(startTime); startHour.setMinutes(0,0,0);
    // Row after start: HH:00 start → highlight HH:00, HH:30 start → highlight HH+1:00
    const startMins=startTime.getMinutes();
    const highlightOffset=startMins>=30?1:0;
    const rowTimes=[];
    for(let i=-6;i<=6;i++) rowTimes.push(new Date(startHour.getTime()+i*3600000));
    // midRowIndex = the hour AFTER start (index 6 = startHour, +offset)
    const midRowIndex=6+highlightOffset;
    const results=await Promise.all([
      fetchAdmiraltyTides().catch(function(e){console.warn(e);return null;}),
      fetchOpenMeteoWind().catch(function(e){console.warn('Wind error:',e.message);return null;})
,
      fetchModelMeta().catch(function(e){return null;})
    ]);
    const eventsRaw=results[0]; const windLkp=results[1]; const modelMeta=results[2];
    fcTideEvents=eventsRaw||[];
    const winStart=new Date(startHour.getTime()-7*3600000);
    const winEnd=new Date(startHour.getTime()+8*3600000);
    const windowEvs=fcTideEvents.filter(function(e){return e.time>=winStart&&e.time<=winEnd;});
    const tbody=document.getElementById('fc-tbody');
    tbody.innerHTML='';
    let fcPrevDir=null;
    rowTimes.forEach(function(t,idx){
      const isMid=idx===midRowIndex;
      const isStart=Math.abs(t-startHour)<1800000;
      const ukT=toUKLocalTime(t);
      const h=ukT.getUTCHours();
      const oKey=ukT.toISOString().slice(0,10)+'T'+String(h).padStart(2,'0')+':00';
      const wind=windLkp?windLkp[oKey]:null;
      const kts=wind?Math.round(wind.spd):null;
      const dir=wind?Math.round(wind.dir):null;
      const bft=kts!==null?knotsToBft(kts):null;
      const ts=fcTidalState(t,fcTideEvents);
      const strm=fcEstStream(t,fcTideEvents);
      const gust=wind?Math.round(wind.gust):null;
      // Store midpoint data for course screen pre-population
      // isNearLW = true if within 2 hours either side of any LW event
      if(isMid){
        var nearLW=fcTideEvents.some(function(ev){
          return ev.type==='LowWater'&&Math.abs(ev.time.getTime()-t.getTime())<=7200000;
        });
        fcStartData={dir:dir,kts:kts,bft:bft,tideState:ts,tideKts:strm,gust:gust,isNearLW:nearLW};
      }
      // Insert HW/LW events that fall in this hour's window
      const ph=new Date(t.getTime()-3600000);
      windowEvs.filter(function(ev){return ev.time>ph&&ev.time<=t;}).forEach(function(ev){
        const evTr=document.createElement('tr');
        evTr.className='fc-event-row';
        const isHW=ev.type==='HighWater';
        const typ=isHW?'\u2B06 HW':'\u2B07 LW';
        const ht=ev.height!==null?' '+ev.height.toFixed(1)+'m':'';
        const etm=formatUKTime(ev.time);
        evTr.innerHTML='<td colspan="5" style="color:'+(isHW?'#4ec87a':'#8a9fb5')+';text-align:left;padding:3px 8px;">'+typ+' '+etm+ht+'</td>';
        tbody.appendChild(evTr);
      });
      const tr=document.createElement('tr');
      // ONLY highlight the midpoint row — no other row gets special background
      if(isMid){tr.className='fc-mid-row';tr.id='fc-mid-row';}
      // Mid row: just the time, styled bigger via CSS — no extra label
      const tLabel=formatUKTime(t);

      // Snap direction to nearest 5° increment for precise arrow
      const snapDeg=dir!==null?(Math.round(dir/5)*5)%360:null;
      // Colour-code arrow by trend vs previous period
      let arrowCol='#e8a020'; // default amber
      if(snapDeg!==null&&fcPrevDir!==null){
        let diff=snapDeg-fcPrevDir;
        while(diff>180)diff-=360;
        while(diff<-180)diff+=360;
        if(diff>2)arrowCol='#4ec87a';       // veering (increasing) — green
        else if(diff<-2)arrowCol='#e05050'; // backing (decreasing) — red
      }
      if(snapDeg!==null)fcPrevDir=snapDeg;
      const wArr=snapDeg!==null?'<div class="fc-wind-cell">'+makeWindArrow(snapDeg,arrowCol)+'<div class="fc-wind-card" style="color:'+arrowCol+'">'+degToCard(snapDeg)+' '+snapDeg+'°</div></div>':'\u2014';
      const kCls=kts===null?'':kts<8?'wind-light':kts<15?'wind-mod':kts<21?'wind-fresh':'wind-strong';
      const ktsStr=kts!==null?'<span class="'+kCls+'">'+kts+'</span>':'\u2014';
      const gCls=gustClass(gust);
      const gStr=gust!==null?'<span class="'+gCls+'">'+gust+'</span>':'\u2014';
      const wxSym=wind?wmoSymbol(wind.wx):'\u2014';
      tr.innerHTML='<td class="fc-time-cell">'+tLabel+'</td><td>'+wArr+'</td>'
        +'<td class="fc-wind-spd">'+ktsStr+'</td>'
        +'<td class="gust-cell">'+gStr+'</td>'
        +'<td class="fc-wx-cell">'+wxSym+'</td>'
        +'<td><span class="tide-badge '+ts.cls+'">'+ts.label+'</span></td>';
      tbody.appendChild(tr);
    });
    document.getElementById('fc-loading').style.display='none';
    document.getElementById('fc-table-wrap').style.display='';
    var hdr=document.querySelector('.fc-tbl-hdr');if(hdr)hdr.style.display='';
    document.getElementById('fc-next-btn').disabled=false;

    if(modelMeta){
      var mtag=document.getElementById('fc-model-tag');
      if(mtag){
        // Determine which model covers the selected date
        var selDate=new Date(document.getElementById('fc-date').value+'T12:00:00');
        var hoursAhead=(selDate-new Date())/3600000;
        var modelName=hoursAhead<=54?'UKV 2km':'Global 10km';
        mtag.textContent='· Last update '+modelMeta.runLabel;
      }
    }
    // Scroll highlighted row to vertical centre of table wrap
    setTimeout(function(){scrollMidRowToCenter();},50);
  } catch(err){
    document.getElementById('fc-loading').style.display='none';
    const el=document.getElementById('fc-error');
    el.textContent='Error: '+err.message;
    el.style.display='block';
    document.getElementById('fc-next-btn').disabled=false;
  }
}

// Refresh button — re-runs forecast and spins the icon
document.getElementById('fc-refresh-btn').addEventListener('click',function(){
  const btn=this;
  btn.style.transition='transform .6s';
  btn.style.transform='rotate(360deg)';
  setTimeout(function(){btn.style.transition='none';btn.style.transform='';},650);
  runForecast();
});

document.getElementById('fc-next-btn').addEventListener('click',function(){
  // Pre-populate course screen with MIDPOINT conditions
  if(fcStartData){
    if(fcStartData.dir!==null){setWindDir(fcStartData.dir);}
    if(fcStartData.kts!==null){
      const ws=document.getElementById('windspeed');
      if(ws){
        if(fcStartData.kts<8) ws.value='light';
        else if(fcStartData.kts<=14) ws.value='moderate';
        else if(fcStartData.kts<=20) ws.value='fresh';
        else ws.value='strong';
      }
    }
    if(fcStartData.tideState){
      const ts=document.getElementById('tide');
      if(ts){
        const s=fcStartData.tideState.state;
        if(s==='hw') ts.value='hw';
        else if(s==='lw'||fcStartData.isNearLW) ts.value='lw';
        else ts.value='mid';
      }
    }
    // Sync duration from forecast screen
    const dur=document.getElementById('fc-duration').value;
    const durSel=document.getElementById('duration');
    if(durSel&&dur){
      // Find closest option
      let closest=null; let minDiff=9999;
      Array.from(durSel.options).forEach(function(o){
        const diff=Math.abs(parseInt(o.value)-parseInt(dur));
        if(diff<minDiff){minDiff=diff;closest=o.value;}
      });
      if(closest) durSel.value=closest;
    }
    render();
  }
  document.getElementById('fc-screen').classList.remove('active');
  document.getElementById('course-screen').classList.add('active');
});

document.getElementById('fc-back-btn').addEventListener('click',function(){
  document.getElementById('course-screen').classList.remove('active');
  document.getElementById('fc-screen').classList.add('active');
});
document.getElementById('cs-back-btn').addEventListener('click',function(){
  document.getElementById('course-screen').classList.remove('active');
  document.getElementById('fc-screen').classList.add('active');
});
