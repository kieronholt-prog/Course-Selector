<title>WSC Course Selector 2026/27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1628;--accent:#e8a020;--accent2:#f0c060;
  --port-bg:rgba(192,57,43,0.18);--stbd-bg:rgba(39,174,96,0.18);
  --text:#e8edf5;--muted:#7a96bc;--border:rgba(255,255,255,0.09);
  --card-bg:rgba(255,255,255,0.04);--card-hi:rgba(255,255,255,0.07);
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);position:relative;
  background-image:radial-gradient(ellipse 90% 40% at 50% 0%,rgba(30,58,110,.55) 0%,transparent 70%),
  repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.013) 39px,rgba(255,255,255,.013) 40px),
  repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.013) 39px,rgba(255,255,255,.013) 40px);}

/* ── Header ── */
header{background:rgba(10,22,40,.96);border-bottom:1px solid var(--border);padding:0 18px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);height:52px;}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:6px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark svg{width:18px;height:18px;}
.header-text h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;color:#fff;line-height:1.1;}
.header-text p{font-size:22px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:1px;}
.screen{max-width:880px;margin:0 auto;padding:18px 14px 50px;}

/* ── Controls ── */
.controls{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:14px;}
.ctrl-label{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;}

/* ── Compass ── */
.wind-section{display:flex;gap:20px;align-items:center;margin-bottom:14px;margin-top:6px;}
.compass-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.compass-container{position:relative;width:158px;height:158px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:none;
  user-select:none;-webkit-user-select:none;}



/* Static bezel labels container — does NOT rotate */
.bezel-labels-static{position:absolute;inset:14px;border-radius:50%;pointer-events:none;}
.bezel-label{position:absolute;left:50%;top:50%;
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;
  color:rgba(255,255,255,.6);line-height:1;}

/* Rotating needle canvas — sits above bezel, below hub */
#needleCanvas{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:5;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);}



.wind-label-wrap{flex:1;}
.wind-dir-display{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:700;
  color:#fff;line-height:1;margin-bottom:4px;}
.wind-dir-sub{font-size:24px;color:var(--muted);}

/* ── Selects ── */
.selects-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
@media(min-width:600px){.selects-row{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}}
.ctrl-wrap{display:flex;flex-direction:column;}
select,input[type=number]{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--rs);color:var(--text);font-family:'Barlow',sans-serif;font-size:22px;
  padding:12px 10px;width:100%;appearance:none;-webkit-appearance:none;
  transition:border-color .15s,background .15s;cursor:pointer;}
select:focus,input:focus{outline:none;border-color:var(--accent);background:rgba(232,160,32,.08);}
select option{background:#0f2044;}

/* ── Course length checkboxes ── */
.check-row{display:flex;gap:6px;flex-wrap:wrap;}
.check-pill{display:flex;align-items:center;gap:5px;cursor:pointer;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--rs);padding:10px 14px;transition:all .15s;
  -webkit-tap-highlight-color:transparent;user-select:none;}
.check-pill:hover{background:rgba(255,255,255,.1);}
.check-pill input[type=checkbox]{width:22px;height:22px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.check-pill span{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:600;
  letter-spacing:.05em;color:var(--text);}
.check-pill.active-SC{border-color:rgba(26,111,168,.6);background:rgba(26,111,168,.12);}
.check-pill.active-MC{border-color:rgba(180,100,30,.6);background:rgba(180,100,30,.12);}
.check-pill.active-LC{border-color:rgba(100,50,170,.6);background:rgba(100,50,170,.12);}

/* ── Sort toggle ── */

/* ── Windward badge on card ── */
.badge-ww{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  background:rgba(39,174,96,.14);color:#5ecb80;
  border:1px solid rgba(39,174,96,.32);padding:3px 7px;border-radius:4px;}
/* ── Legend ── */
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:8px 12px;margin-bottom:14px;
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--rs);}
.leg{display:flex;align-items:center;gap:5px;font-size:22px;color:var(--muted);}
.leg-sw{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.leg-sep{width:1px;height:12px;background:var(--border);margin:0 2px;}

/* ── Results ── */
.res-meta{font-size:22px;color:var(--muted);margin-bottom:10px;
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.res-dot{width:3px;height:3px;border-radius:50%;background:var(--muted);flex-shrink:0;}

/* ── Course cards ── */
.course-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);
  padding:12px;margin-bottom:9px;overflow:hidden;
  transition:border-color .15s,background .15s;animation:fadeUp .22s ease both;}
.course-card:hover{background:var(--card-hi);border-color:rgba(255,255,255,.16);}
.course-card.best{border-color:var(--accent);background:rgba(232,160,32,.05);}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.course-card:nth-child(1){animation-delay:0ms}.course-card:nth-child(2){animation-delay:40ms}
.course-card:nth-child(3){animation-delay:80ms}.course-card:nth-child(4){animation-delay:120ms}
.course-card:nth-child(5){animation-delay:160ms}.course-card:nth-child(6){animation-delay:200ms}
.course-card:nth-child(7){animation-delay:240ms}.course-card:nth-child(8){animation-delay:280ms}
.course-card:nth-child(9){animation-delay:320ms}.course-card:nth-child(10){animation-delay:360ms}

canvas.mini{display:block;border-radius:var(--rs);background:rgba(0,0,0,.28);
  border:1px solid rgba(255,255,255,.07);width:100%;height:160px;cursor:pointer;margin-bottom:9px;}
canvas.mini:hover{border-color:rgba(232,160,32,.5);}

.card-hdr{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:10px;}
.card-title{display:contents;}
.c-letter{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;color:#fff;line-height:1;}
.c-type{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;padding:3px 7px;border-radius:4px;}
.t-SC{background:rgba(26,111,168,.22);color:#5bb5e8;border:1px solid rgba(26,111,168,.35);}
.t-MC{background:rgba(180,100,30,.22);color:#d4884a;border:1px solid rgba(180,100,30,.35);}
.t-LC{background:rgba(100,50,170,.22);color:#b07ae0;border:1px solid rgba(100,50,170,.35);}
.badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}

.badge-warn{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;background:rgba(232,160,32,.12);color:var(--accent2);
  border:1px solid rgba(232,160,32,.28);padding:3px 7px;border-radius:4px;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:9px;align-items:stretch;}
.stat{background:rgba(0,0,0,.22);border-radius:var(--rs);padding:10px 8px;border:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:700;color:#fff;line-height:1;}
.stat-unit{font-size:22px;font-weight:400;color:var(--muted);margin-left:1px;}
.stat-sub{font-family:'Barlow Condensed',sans-serif;font-size:22px;color:var(--muted);margin-top:5px;line-height:1.3;}
.marks-row{display:flex;flex-wrap:wrap;align-items:center;gap:3px;margin-bottom:8px;}
.mk{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:600;
  padding:3px 7px;border-radius:3px;white-space:nowrap;line-height:1.4;}
.mk-P{background:var(--port-bg);color:#e87070;border:1px solid rgba(192,57,43,.32);}
.mk-S{background:var(--stbd-bg);color:#5ecb80;border:1px solid rgba(39,174,96,.32);}
.mk-end{background:rgba(255,255,255,.07);color:var(--muted);border:1px solid var(--border);}
.mk-once{opacity:.45;}
.mk-arr{color:rgba(255,255,255,.18);font-size:22px;line-height:1;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-ico{font-size:36px;margin-bottom:12px;filter:grayscale(1) opacity(.35);}
.empty h3{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.empty p{font-size:24px;}
.footnote{margin-top:16px;font-size:22px;color:rgba(122,150,188,.55);line-height:1.65;
  padding:11px 12px;border:1px solid rgba(255,255,255,.04);border-radius:var(--rs);}
.footnote strong{color:rgba(122,150,188,.75);}

/* ── Full-screen course overlay ── */
.overlay{display:none;position:fixed;inset:0;
  z-index:200;background:rgba(8,16,32,.97);flex-direction:column;
  -webkit-tap-highlight-color:transparent;}
.overlay.open{display:flex;}
.overlay-header{display:flex;align-items:center;gap:10px;padding:14px 18px;
  padding-top:max(14px, env(safe-area-inset-top));
  border-bottom:1px solid var(--border);flex-shrink:0;}
.overlay-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;color:#fff;flex:1;}
.overlay-close{width:36px;height:36px;border-radius:6px;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);color:var(--text);font-size:30px;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.overlay-close:hover{background:rgba(255,255,255,.14);}
/* Body fills all remaining space — no fixed height, flex does the work */
.overlay-body{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0;}
/* Canvas area stretches to fill */
.overlay-canvas-wrap{flex:1;position:relative;overflow:hidden;padding:12px;min-width:0;min-height:0;}
#overlayCanvas{display:block;border-radius:var(--r);background:rgba(0,0,0,.3);width:100%;height:100%;}
/* Sidebar fixed width */
.overlay-sidebar{width:140px;flex-shrink:0;display:flex;flex-direction:column;
  padding:12px 12px 12px 8px;gap:10px;overflow-y:auto;border-left:1px solid var(--border);}
.ovl-stat{background:rgba(0,0,0,.3);border-radius:var(--rs);padding:8px 10px;border:1px solid rgba(255,255,255,.05);}
.ovl-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.ovl-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;color:#fff;line-height:1;}
.ovl-stat-unit{font-size:22px;font-weight:400;color:var(--muted);margin-left:2px;}
.ovl-marks{font-size:22px;color:var(--muted);line-height:1.8;margin-top:4px;}
.ovl-marks .mk{font-size:22px;display:inline-block;margin:2px 1px;}

@media(max-width:500px){
  .overlay-body{flex-direction:column;}
  .overlay-sidebar{width:100%;flex-direction:row;flex-wrap:wrap;height:auto;flex-shrink:0;
    border-left:none;border-top:1px solid var(--border);padding:10px;gap:8px;overflow-y:visible;}
  .overlay-canvas-wrap{flex:1;min-height:0;}
  .ovl-marks{display:none;}
}

/* ── Forecast screen ── */
/* ── App shell: two screens, class on body controls which shows ── */
.app-shell{position:fixed;inset:0;overflow:hidden;background:var(--navy);}
.app-screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
  padding-top:max(35px,env(safe-area-inset-top));
  transition:opacity .2s, transform .2s;
  opacity:0;pointer-events:none;transform:translateX(30px);}
.app-screen.active{opacity:1;pointer-events:auto;transform:translateX(0);}
/* Forecast screen */
.fc-body{flex:1;overflow:hidden;padding:8px 10px 4px;display:flex;flex-direction:column;gap:5px;min-height:0;}
.fc-foot{padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(10,22,40,.96);border-top:1px solid var(--border);flex-shrink:0;}

.fc-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;}
.fc-card-hdr{background:rgba(255,255,255,.04);padding:5px 10px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;overflow:hidden;}
/* Input row: 3-up grid */
.fc-inputs-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:5px 10px;border-bottom:1px solid var(--border);}
.fc-inp-cell{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);border-radius:var(--rs);padding:5px 7px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fc-inp-cell:active{border-color:var(--accent);background:rgba(232,160,32,.07);}
.fc-inp-lbl{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:3px;}
.fc-inp-lbl .fc-inp-icon{font-size:18px;}
.fc-inp-val{font-size:18px;font-weight:600;color:var(--text);margin-top:1px;}
.fc-inp-val.amber{color:var(--accent);}
/* Native inputs styled to look like the cell value */
.fc-native-input{background:none;border:none;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;padding:0;margin-top:2px;width:100%;outline:none;cursor:pointer;color-scheme:dark;-webkit-appearance:none;appearance:none;}
.fc-native-input[type="date"]{color:var(--text);}
.fc-native-input[type="time"]{color:var(--text);}
.fc-native-input::-webkit-calendar-picker-indicator{opacity:0;position:absolute;width:100%;height:100%;top:0;left:0;cursor:pointer;}
.fc-native-select{color:var(--accent);-webkit-appearance:none;appearance:none;}
.fc-form-row{display:flex;align-items:center;padding:12px 16px;gap:10px;border-bottom:1px solid var(--border);}
.fc-form-row:last-child{border-bottom:none;}
.fc-form-label{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:600;color:var(--muted);}
.fc-form-input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:var(--rs);color:var(--text);font-family:'Barlow',sans-serif;font-size:18px;padding:9px 12px;width:170px;text-align:right;}
.fc-form-input:focus{outline:none;border-color:var(--accent);background:rgba(232,160,32,.08);}

/* Forecast table */
.fc-tbl{width:100%;border-collapse:collapse;table-layout:fixed;}
.fc-tbl th:nth-child(1),.fc-tbl td:nth-child(1){width:16%;text-align:left;}  /* Time */
.fc-tbl th:nth-child(2),.fc-tbl td:nth-child(2){width:30%;}  /* Dir */
.fc-tbl th:nth-child(3),.fc-tbl td:nth-child(3){width:13%;}  /* Kts */
.fc-tbl th:nth-child(4),.fc-tbl td:nth-child(4){width:13%;}  /* Gust */
.fc-tbl th:nth-child(5),.fc-tbl td:nth-child(5){width:10%;}  /* Wx */
.fc-tbl th:nth-child(6),.fc-tbl td:nth-child(6){width:24%;}  /* Tide */
.fc-tbl th{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:4px 4px;text-align:center;border-bottom:1px solid var(--border);}
.fc-tbl td{padding:1px 4px;text-align:center;font-family:'Barlow',sans-serif;font-size:18px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;background:var(--navy);}
.fc-tbl tr:last-child td{border-bottom:none;}
/* ◎ midpoint row — only highlighted row */
/* fc-mid-row td styles consolidated below */
.fc-mid-row .fc-time-cell{font-size:18px !important;font-weight:700;color:var(--accent) !important;line-height:1.15;}
.fc-mid-row .fc-wind-spd{font-size:20px !important;font-weight:700;color:#fff !important;}
.fc-mid-row .gust-cell{font-size:18px !important;font-weight:700;}
.fc-mid-row .fc-wind-arrow{font-size:18px !important;color:#fff;}
/* Start row: subtle, not highlighted */
.fc-start-row td{color:var(--muted);}

.fc-tbl tr.fc-start-row td{background:rgba(232,160,32,.08);}
.fc-tbl tr.fc-start-row td:first-child{border-left:3px solid var(--accent);}
.fc-time-cell{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--muted);white-space:nowrap;text-align:left;padding-left:2px !important;}
.fc-wind-arrow{font-size:18px;}
.fc-wind-card{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--muted);}
.fc-wind-spd{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:#fff;}
.fc-bft{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--muted);}

.tide-badge{display:inline-block;padding:2px 5px;border-radius:var(--rs);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.05em;white-space:nowrap;}
.tide-flood{background:rgba(42,181,165,.18);color:#4fcfbf;border:1px solid rgba(42,181,165,.35);}
.tide-ebb{background:rgba(192,57,43,.18);color:#e87070;border:1px solid rgba(192,57,43,.35);}
.tide-hw{background:rgba(39,174,96,.2);color:#5ecb80;border:1px solid rgba(39,174,96,.38);}
.tide-lw{background:rgba(150,150,150,.15);color:#8a9fb5;border:1px solid rgba(150,150,150,.25);}


/* Gust colour bands */
.gust-cell{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;}
.gust-light{color:#7a96bc;}
.gust-mod{color:#5ecb80;}
.gust-fresh{color:#e8a020;}
.gust-strong{color:#e87070;}
.gust-very-strong{color:#c0392b;background:rgba(192,57,43,.15);border-radius:4px;padding:1px 4px;}

/* Row tint by gust band */
.fc-tbl tr.gust-row-mod td{background:rgba(39,174,96,.04);}
.fc-tbl tr.gust-row-fresh td{background:rgba(232,160,32,.06);}
.fc-tbl tr.gust-row-strong td{background:rgba(232,80,32,.08);}
.fc-tbl tr.gust-row-very-strong td{background:rgba(192,57,43,.12);}
/* start row always wins */
.fc-tbl tr.fc-start-row td{background:rgba(232,160,32,.13) !important;}
.fc-tbl tr.fc-start-row td:first-child{border-left:3px solid var(--accent);}

.fc-event-row td{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--muted);font-style:italic;background:rgba(255,255,255,.02);padding:5px 8px;}
.fc-loading{text-align:center;padding:28px 16px;color:var(--muted);}
.fc-spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:fc-spin .8s linear infinite;margin:0 auto 10px;}
@keyframes fc-spin{to{transform:rotate(360deg)}}
.fc-error{background:rgba(192,57,43,.14);border:1px solid rgba(192,57,43,.38);border-radius:var(--rs);padding:14px 16px;font-size:18px;color:#e88;margin:10px 14px;}
.fc-tide-summary{padding:10px 16px;font-family:'Barlow',sans-serif;font-size:18px;color:var(--muted);line-height:1.9;}
.fc-tide-summary strong{color:var(--text);}
.fc-pill-strip{display:flex;gap:8px;padding:10px 16px;flex-wrap:wrap;}
.fc-pill{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:4px 13px;font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--muted);}
.fc-pill strong{color:var(--text);}





/* ── Compact course-screen control grid ── */
.cs-ctrl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;padding:0 0 6px;}
.cs-ctrl-cell{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:var(--rs);padding:8px 9px;display:flex;flex-direction:column;gap:3px;cursor:pointer;}
.cs-ctrl-lbl{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.cs-ctrl-select{background:none;border:none;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;padding:0;outline:none;width:100%;cursor:pointer;color-scheme:dark;-webkit-appearance:none;appearance:none;}
/* Mini pills for course length inside the grid */
.cs-pill-row{display:flex;gap:4px;margin-top:1px;}
.cs-mini-pill{display:flex;align-items:center;gap:0;cursor:pointer;}
.cs-mini-pill input{display:none;}
.cs-mini-pill span{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--muted);transition:all .15s;}
.cs-mini-pill input:checked+span{background:rgba(232,160,32,.18);border-color:rgba(232,160,32,.45);color:var(--accent);}

/* ── Course screen layout ─────────────────────────────────────────── */
.cs-screen{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
.cs-ctrl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:6px 10px 5px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.cs-ctrl-cell{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:6px;padding:4px 7px;display:flex;flex-direction:column;gap:2px;cursor:pointer;}
.cs-ctrl-lbl{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.cs-ctrl-select{background:none;border:none;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;padding:0;outline:none;width:100%;cursor:pointer;color-scheme:dark;-webkit-appearance:none;appearance:none;}
.cs-pill-row{display:flex;gap:4px;margin-top:1px;}
.cs-mini-pill{cursor:pointer;}
.cs-mini-pill input{display:none;}
.cs-mini-pill span{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;padding:3px 6px;border-radius:3px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--muted);display:block;}
.cs-mini-pill input:checked+span{background:rgba(232,160,32,.18);border-color:rgba(232,160,32,.4);color:var(--accent);}

/* Course results list */
.cs-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}

/* Each course row: mini-canvas | letter+marks | laps+time */
.cs-row{display:grid;grid-template-columns:78px 1fr auto;border-bottom:1px solid rgba(255,255,255,.06);min-height:102px;cursor:pointer;}
.cs-row:active{background:rgba(255,255,255,.02);}
.cs-row.cs-best{border-left:2px solid var(--accent);}
.cs-row-canvas{width:78px;background:rgba(0,0,0,.3);border-right:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cs-row-mid{padding:8px 10px;display:flex;flex-direction:column;justify-content:center;gap:5px;min-width:0;overflow:hidden;}
.cs-row-letter{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:#fff;line-height:1;display:flex;align-items:baseline;gap:7px;}
.cs-row-ww{font-size:18px;font-weight:700;color:#5ecb80;}
.cs-row-marks{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;}
.cs-mk{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;}
.cs-mk-p{background:rgba(192,57,43,.16);color:#e87070;}
.cs-mk-s{background:rgba(39,174,96,.16);color:#5ecb80;}
.cs-mk-e{background:rgba(255,255,255,.07);color:var(--muted);}
.cs-mk-once{opacity:.45;}
.cs-row-right{padding:8px 10px 8px 4px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:5px;flex-shrink:0;}
.cs-row-laps{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#fff;line-height:1;}
.cs-row-laps span{font-size:18px;color:var(--muted);font-weight:400;}
.cs-row-time{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;color:var(--accent);}
.cs-row-map{font-size:18px;color:var(--muted);margin-top:2px;}
.cs-row-warn{font-size:18px;color:var(--accent);font-weight:600;}

/* Map popup */
.cs-map-overlay{position:absolute;inset:0;background:#040e1a;display:flex;flex-direction:column;z-index:50;}
.cs-map-hdr{background:#0b1a30;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.cs-map-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--accent);}
.cs-map-sub{font-size:18px;color:var(--muted);margin-top:1px;}

.cs-map-wind{padding:5px 12px;background:rgba(232,160,32,.06);border-bottom:1px solid rgba(232,160,32,.1);display:flex;gap:14px;align-items:center;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;}




.cs-map-canvas-wrap{flex:1;min-height:0;padding:8px 10px;display:flex;align-items:center;justify-content:center;}
.cs-map-canvas-wrap canvas{width:100%;height:100%;display:block;}
.cs-map-marks{flex-shrink:0;padding:5px 10px 7px;display:flex;flex-wrap:wrap;align-items:center;gap:3px;border-top:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.2);}
.cs-map-mk{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;padding:3px 7px;border-radius:3px;white-space:nowrap;}
.cs-map-mk-e{background:rgba(255,255,255,.07);color:#e8a020;border:1px solid rgba(232,160,32,.3);}
.cs-map-mk-p{background:rgba(192,57,43,.16);color:#e87070;border:1px solid rgba(192,57,43,.28);}
.cs-map-mk-s{background:rgba(39,174,96,.16);color:#5ecb80;border:1px solid rgba(39,174,96,.28);}
.cs-map-mk-once{opacity:.45;}
.cs-map-arr{color:rgba(255,255,255,.2);font-size:18px;margin:0 1px;}

/* Compass strip */
.cs-compass-strip{flex-shrink:0;background:#0b1a30;border-top:1px solid rgba(255,255,255,.1);padding:10px 14px;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:16px;min-height:158px;}
.cs-compass-dial{position:relative;width:138px;height:138px;cursor:grab;flex-shrink:0;}
.cs-compass-left{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:80px;}
.cs-compass-right{display:flex;flex-direction:column;align-items:flex-start;gap:4px;min-width:80px;}
.cs-compass-hint{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.cs-compass-deg{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:700;color:var(--accent);line-height:1;}
.cs-compass-card{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:700;color:#fff;line-height:1;}


/* Map popup revised stats grid */
.cs-map-stats{display:grid;grid-template-columns:1fr 1.4fr 1.4fr 1fr;gap:4px;padding:5px 10px;flex-shrink:0;}
.cs-map-stat{background:rgba(255,255,255,.05);border-radius:6px;padding:7px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cs-map-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.cs-map-stat-n{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#fff;line-height:1.1;}
.cs-map-stat-n2{font-size:18px;color:var(--accent);margin-top:1px;}
/* Laps — big number */
.cs-map-stat-laps{background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.2);}
.cs-map-stat-laps-n{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:700;color:#fff;line-height:1;}
/* Back button cell */
.cs-map-back-cell{background:var(--accent);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cs-map-back-cell:active{opacity:.8;}
.cs-map-back-arr{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:var(--navy);line-height:1;}
.cs-map-back-cell .cs-map-stat-u{color:var(--navy);}
/* Course type badge above marks */
.cs-map-type{padding:5px 10px 3px;flex-shrink:0;}
/* Nav buttons — amber fill, consistent */
.btn-next-screen,.btn-back-screen{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:var(--rs);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-next-screen{width:100%;padding:14px;background:var(--accent);color:var(--navy);font-size:20px;}
.btn-next-screen:active{opacity:.85;}
.btn-back-screen{background:var(--accent);color:var(--navy);padding:8px 18px;font-size:18px;}
.btn-back-screen:active{opacity:.85;}

/* Back cell in control grid — amber fill matching nav buttons */
.cs-back-cell{background:var(--accent) !important;border-color:var(--accent) !important;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  align-items:center;justify-content:center;}
.cs-back-cell:active{opacity:.82;}
.cs-back-arr{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;
  color:var(--navy);line-height:1;display:block;}

/* ── Wind speed colour classes (forecast + course selector) ── */
.wind-light{color:#7ec8e3;font-weight:700;}
.wind-mod{color:#5ecb80;font-weight:700;}
.wind-fresh{color:#e8a020;font-weight:700;}
.wind-strong{color:#e07070;font-weight:700;}

/* ── Gust colour classes (reuse existing gustClass) ── */
.gust-light{color:#7ec8e3;font-weight:700;}
.gust-mod{color:#5ecb80;font-weight:700;}
.gust-fresh{color:#e8a020;font-weight:700;}
.gust-strong{color:#e07070;font-weight:700;}
.gust-vstrong{color:#d040d0;font-weight:700;}

/* ── Wind speed and gust cells — 2px larger ── */
.fc-wind-spd{font-size:22px;text-align:center;}
.gust-cell{font-size:22px;text-align:center;}
.fc-wx-cell{font-size:22px;text-align:center;}

/* ── Forecast mid (highlighted) row — amber top AND bottom border ── */
.fc-mid-row td{
  font-size:22px;
  font-weight:700;
  padding:1px 4px !important;
  background:#0f2540;
  border-top:2px solid var(--accent) !important;
  border-bottom:2px solid var(--accent);
}

/* ── cs-map stats: 3 cells (no laps) ── */
.cs-map-stats{display:grid;grid-template-columns:1.4fr 1.4fr 1fr;gap:4px;padding:5px 10px;flex-shrink:0;}

/* ── Fleet lap boxes below marks ── */
.cs-map-fleet-laps{padding:5px 10px 3px;flex-shrink:0;}
.cs-fleet-laps-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.cs-fleet-lap-cell{background:rgba(255,255,255,.06);border-radius:6px;padding:6px 4px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.cs-fl-fast{border-top:2px solid #7ec8e3;}
.cs-fl-med{border-top:2px solid #5ecb80;}
.cs-fl-slow{border-top:2px solid #e8a020;}
.cs-fl-flag{width:32px;height:20px;border-radius:2px;display:flex;align-items:center;
  justify-content:center;overflow:hidden;flex-shrink:0;}
.cs-fl-flag svg{display:block;}
.cs-fl-lbl{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--muted);}
.cs-fl-n{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:700;color:#fff;line-height:1;}
.cs-fl-u{font-size:18px;color:var(--muted);}

/* ── Course selector: wind band label colour coding ── */
#windspeed option[value="light"]  {color:#7ec8e3;}
#windspeed option[value="moderate"]{color:#5ecb80;}
#windspeed option[value="fresh"]  {color:#e8a020;}
#windspeed option[value="strong"] {color:#e07070;}

/* ── Wind band colour on the select itself ── */
#windspeed.band-light   .cs-ctrl-select{color:#7ec8e3;}
#windspeed.band-moderate .cs-ctrl-select{color:#5ecb80;}

.cs-fl-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.cs-fl-times{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--accent);margin-top:1px;}

.model-ukv{display:block;font-size:11px;font-weight:700;color:rgba(94,203,128,.7);letter-spacing:.04em;line-height:1;margin-top:2px;}
.model-global{display:block;font-size:11px;font-weight:700;color:rgba(122,150,188,.55);letter-spacing:.04em;line-height:1;margin-top:2px;}
.fc-wind-cell{display:flex;flex-direction:row;align-items:center;gap:4px;}

.fc-wind-arrow{line-height:1;color:rgba(255,255,255,.85);}
</style>
</head>

const BAND_LABEL={light:"Light <8 kts",moderate:"Moderate 8–14 kts",fresh:"Fresh 15–20 kts",strong:"Strong 20+"};

function courseSpeed(fleet,windBand,wwFrac,effectivePY){
  const fleetKey=(fleet==="class"||!LEG_SPEEDS[fleet])?"medium":fleet;
  const anchorPY=FLEET_ANCHOR_PY[fleetKey]||1104;
  const legs=LEG_SPEEDS[fleetKey][windBand]||LEG_SPEEDS[fleetKey].moderate;
  const pyScale=anchorPY/effectivePY;
  const up=legs.up*pyScale; const dwn=legs.dwn*pyScale; const rch=legs.rch*pyScale;
  const ww=wwFrac>0?wwFrac:0.38;
  return 1/(ww/up+(1-ww)*0.5/rch+(1-ww)*0.5/dwn);
}

// Bearing between two lat/lon coords (degrees, 0=N clockwise)
function bearing(a,b){
  const φ1=a.lat*Math.PI/180,φ2=b.lat*Math.PI/180;
  const dλ=(b.lon-a.lon)*Math.PI/180;
  const y=Math.sin(dλ)*Math.cos(φ2);
  const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(dλ);
  return((Math.atan2(y,x)*180/Math.PI)+360)%360;
}

// Angular difference between two bearings (0–180)
function angleDiff(a,b){return Math.abs(((a-b)+540)%360-180);}

// Laid marks that can be repositioned — wider windward angle
const LAID_MARKS=new Set(["LAID MK A","LAID MK B","LAID MK C","LAID MK D"]);

// Is a leg windward? A boat sailing upwind points TOWARD the wind source (windFromDeg).
// So compare leg bearing directly against windFromDeg — not its reciprocal.
function isWindwardLeg(fromMark,toMark,windFromDeg,isLaid){
  const a=MARKS[fromMark],b=MARKS[toMark];
  if(!a||!b)return false;
  const legBrg=bearing(a,b);
  const diff=angleDiff(legBrg,windFromDeg);
  return diff<=(isLaid?45:30);
}

// Calculate windward leg distances for a course
function calcWindwardLegs(c,windFromDeg){
  if(windFromDeg===null||windFromDeg===undefined)return{wwLapNm:0,wwOncNm:0,wwLegsPerLap:0,wwLegsOnce:0};
  const scoreSegs=(seqPairs)=>seqPairs.map(([fn,tn])=>{
    const isLaid=LAID_MARKS.has(fn)||LAID_MARKS.has(tn);
    const ww=isWindwardLeg(fn,tn,windFromDeg,isLaid);
    const dist=(MARKS[fn]&&MARKS[tn])?hav(MARKS[fn],MARKS[tn]):0;
    return{dist,ww};
  });
  const pairs=(seq)=>{const p=[];for(let i=0;i<seq.length-1;i++)p.push([seq[i][0],seq[i+1][0]]);return p;};

  // Once-only segments: init (SF->...->lap[0]) and final (lap[last]->...->SF)
  const initSeq=[["START/FINISH",null],...c.initial,c.lap[0]];
  const finalSeq=[c.lap[c.lap.length-1],...c.final,["START/FINISH",null]];
  const onceSegs=[...scoreSegs(pairs(initSeq)),...scoreSegs(pairs(finalSeq))];

  // Per-lap segments: lap[0]->...->lap[last] (one way) + return leg lap[last]->lap[0]
  const lapOneWaySegs=c.lap.length>=2?scoreSegs(pairs(c.lap)):[];
  const returnSeg=c.lap.length>=2?scoreSegs([[c.lap[c.lap.length-1][0],c.lap[0][0]]]):[];
  // return leg is sailed (N-1) times but we store per-lap and adjust outside
  // For scoring purposes, include return in lapSegs (counted ×laps like lap, adjusted by caller)
  // Actually: return is sailed N-1 times. We'll store separately.
  const lapSegs=[...lapOneWaySegs,...returnSeg];

  return{
    wwLapNm:lapSegs.filter(s=>s.ww).reduce((a,s)=>a+s.dist,0),
    wwOncNm:onceSegs.filter(s=>s.ww).reduce((a,s)=>a+s.dist,0),
    wwLegsPerLap:lapSegs.filter(s=>s.ww).length,
    wwLegsOnce:onceSegs.filter(s=>s.ww).length,
    // Granular for accurate total: oneway WW + return WW separately
    wwLapOnewayNm:lapOneWaySegs.filter(s=>s.ww).reduce((a,s)=>a+s.dist,0),
    wwReturnNm:returnSeg.filter(s=>s.ww).reduce((a,s)=>a+s.dist,0),
  };
}


function hav(a,b){
  const R=3440.065,φ1=a.lat*Math.PI/180,φ2=b.lat*Math.PI/180;
  const dφ=(b.lat-a.lat)*Math.PI/180,dλ=(b.lon-a.lon)*Math.PI/180;
  const s=Math.sin(dφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}
function segDist(seq){
  let d=0;for(let i=1;i<seq.length;i++){const a=MARKS[seq[i-1][0]],b=MARKS[seq[i][0]];if(a&&b)d+=hav(a,b);}return d;
}
function calcDists(c){
  const SF=["START/FINISH",null];
  const lap=c.lap;
  // One-way lap distance: lap[0] -> lap[1] -> ... -> lap[last]  (no close)
  const lapOneway=segDist([...lap]);
  // Return leg: lap[last] -> lap[0]  (between laps, and once at very end before final)
  const lastMark=MARKS[lap[lap.length-1][0]],firstMark=MARKS[lap[0][0]];
  const returnDist=(lastMark&&firstMark)?hav(lastMark,firstMark):0;
  // Init: SF -> ...initial... -> lap[0]
  const initDist=segDist([SF,...c.initial,lap[0]]);
  // Final: lap[last] -> ...final... -> SF
  const finalDist=segDist([lap[lap.length-1],...c.final,SF]);
  return{lapOneway,returnDist,initDist,finalDist};
}
function calcFromLaps(c,laps,speed){
  const{lapOneway,returnDist,initDist,finalDist}=calcDists(c);
  // total = init + N*lapOneway + (N-1)*return + final
  const totalNm=initDist+laps*lapOneway+(laps-1)*returnDist+finalDist;
  const timeMins=(totalNm/speed)*60;
  return{lapOneway,returnDist,initDist,finalDist,totalNm,timeMins};
}

const DIR_DEGS={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,
  S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};

// Draw Option-2 compass (minimal ring + cardinals + arc + needle)
// All drawn on needleCanvas; called once on load and on every wind change.
function drawCompass(dirDeg){
  const cv=document.getElementById('needleCanvas');
  const dpr=window.devicePixelRatio||1;
  const S=138;
  cv.width=S*dpr; cv.height=S*dpr;
  cv.style.width=S+'px'; cv.style.height=S+'px';
  const ctx=cv.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr,dpr);
  const cx=S/2, cy=S/2, R=S/2-4;
  ctx.clearRect(0,0,S,S);

  // Thin amber outer ring
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(232,160,32,.3)'; ctx.lineWidth=2; ctx.stroke();

  // Subtle inner reference circle
  ctx.beginPath(); ctx.arc(cx,cy,R*0.62,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1; ctx.stroke();

  // Intercardinal tick marks
  for(let i=0;i<8;i++){
    if(i%2===0) continue;
    const a=(i/8)*Math.PI*2-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx+(R-1)*Math.cos(a), cy+(R-1)*Math.sin(a));
    ctx.lineTo(cx+(R-9)*Math.cos(a), cy+(R-9)*Math.sin(a));
    ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Cardinal labels — upright, inside ring
  ['N','E','S','W'].forEach(function(dir){
    const deg=DIR_DEGS[dir];
    const rad=(deg-90)*Math.PI/180;
    const lr=R-13;
    const x=cx+lr*Math.cos(rad), y=cy+lr*Math.sin(rad);
    ctx.save();
    ctx.translate(x,y); ctx.rotate(deg*Math.PI/180);
    ctx.font="bold 11px 'Barlow Condensed',sans-serif";
    ctx.fillStyle=dir==='N'?'#e8a020':'rgba(255,255,255,.72)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(dir,0,0);
    ctx.restore();
  });

  if(dirDeg===null||dirDeg===undefined){return;}

  // Active direction arc on outer ring
  const aRad=dirDeg*Math.PI/180-Math.PI/2;
  ctx.beginPath();
  ctx.arc(cx,cy,R+1, aRad-0.22, aRad+0.22);
  ctx.strokeStyle='#e8a020'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();

  // Needle — FROM dirDeg (tail), arrowhead points downwind
  const rad=dirDeg*Math.PI/180;
  const nr=R-14;
  const tx=cx+nr*Math.sin(rad), ty=cy-nr*Math.cos(rad);
  const px=cx-nr*Math.sin(rad), py=cy+nr*Math.cos(rad);

  // Glow
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(px,py);
  ctx.strokeStyle='rgba(232,160,32,.18)'; ctx.lineWidth=14; ctx.lineCap='round'; ctx.stroke();
  // Core shaft
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(px,py);
  ctx.strokeStyle='rgba(232,160,32,.9)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();

  // Arrowhead at point end
  const dx=px-tx, dy=py-ty, dist=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/dist, uy=dy/dist, vx=-uy, vy=ux;
  const hl=13, hw=7, hx=px-ux*hl, hy=py-uy*hl;
  ctx.beginPath(); ctx.moveTo(px,py);
  ctx.lineTo(hx+vx*hw,hy+vy*hw); ctx.lineTo(hx-vx*hw,hy-vy*hw);
  ctx.closePath(); ctx.fillStyle='#e8a020'; ctx.fill();

  // Hub
  ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2);
  ctx.fillStyle='#0b1a30'; ctx.fill();
  ctx.strokeStyle='#e8a020'; ctx.lineWidth=2; ctx.stroke();
}
drawCompass(null);

function snapToNearest16(deg){
  // Snap arbitrary degree to nearest of 16 compass points
  const dirs=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  const degs={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
  deg=((deg%360)+360)%360;
  let best=dirs[0],bestDiff=360;
  for(const d of dirs){let diff=Math.abs(degs[d]-deg);if(diff>180)diff=360-diff;if(diff<bestDiff){bestDiff=diff;best=d;}}
  return best;
}
function degToCard(deg){
  // Returns nearest 16-point cardinal string for a degree bearing
  deg=((deg%360)+360)%360;
  let best=DIRS[0],bestDiff=360;
  for(const d of DIRS){let diff=Math.abs(DIR_DEGS[d]-deg);if(diff>180)diff=360-diff;if(diff<bestDiff){bestDiff=diff;best=d;}}
  return best;
}
function snapToNearest(deg){
  deg=((deg%360)+360)%360;
  let best=DIRS[0],bestDiff=360;
  for(const d of DIRS){let diff=Math.abs(DIR_DEGS[d]-deg);if(diff>180)diff=360-diff;if(diff<bestDiff){bestDiff=diff;best=d;}}
  return best;
}

function setWindDir(deg){
  // deg = degrees 0-359 (precise), or a cardinal string for backward compat
  if(typeof deg==="string") deg=DIR_DEGS[deg]||0;
  deg=((deg%360)+360)%360;
  selWind=deg;
  drawCompass(deg);
  // Cardinal label for display
  const card=degToCard(deg);
  document.getElementById("windDirDisplay").textContent=card+" "+Math.round(deg)+"°";
  document.getElementById("windDirSub").textContent=Math.round(deg)+"°";
  render();
}

// Compass interaction
(function(){
  const el=document.getElementById("compassContainer");let dragging=false;
  function getAngle(e){
    const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
    const pt=e.touches?e.touches[0]:e;
    return((Math.atan2(pt.clientX-cx,-(pt.clientY-cy))*180/Math.PI)+360)%360;
  }
  function handle(e){if(!dragging)return;e.preventDefault();const deg=Math.round(getAngle(e)/5)*5;if(deg!==selWind)setWindDir(deg);}
  el.addEventListener("mousedown",e=>{dragging=true;setWindDir(Math.round(getAngle(e)/5)*5);});
  el.addEventListener("touchstart",e=>{dragging=true;e.preventDefault();setWindDir(Math.round(getAngle(e)/5)*5);},{passive:false});
  window.addEventListener("mousemove",handle);window.addEventListener("touchmove",handle,{passive:false});
  window.addEventListener("mouseup",()=>dragging=false);window.addEventListener("touchend",()=>dragging=false);
})();

// ─────────────────────────────────────────────────────────────────
// COURSE MAP DRAWING — shared by mini and overlay
// ─────────────────────────────────────────────────────────────────
function drawCourseMap(canvas, course, windDir, large, windBandLabel, windKts, windGust){
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const W=canvas.width/dpr, H=canvas.height/dpr;
  ctx.clearRect(0,0,W,H);
  const all=course.marks;
  const coords=all.map(m=>MARKS[m[0]]).filter(Boolean);
  if(coords.length<2)return;
  const lats=coords.map(c=>c.lat),lons=coords.map(c=>c.lon);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats);
  const minLon=Math.min(...lons),maxLon=Math.max(...lons);
  const cosLat=Math.cos((minLat+maxLat)/2*Math.PI/180);
  const ranLat=(maxLat-minLat)||0.0005,ranLon=(maxLon-minLon)||0.0005;
  const windBoxW=large?110:0;
  const padL=large?28:11, padR=(large?28:11)+windBoxW;
  const padT=large?28:11, padB=large?28:11;
  const sc=Math.min((W-padL-padR)/(ranLon/cosLat),(H-padT-padB)/ranLat);
  const ox=padL+(W-padL-padR-(ranLon/cosLat)*sc)/2;
  const oy=padT+(H-padT-padB-ranLat*sc)/2;
  function xy(c){return[ox+(c.lon-minLon)/cosLat*sc,oy+(maxLat-c.lat)*sc];}
  const pts=all.map(m=>MARKS[m[0]]?xy(MARKS[m[0]]):null);

  // Pre-compute windward status per leg
  const windFromDeg=windDir!==null&&windDir!==undefined?windDir:null;
  const legWW=[];
  for(let i=0;i<all.length-1;i++){
    const fn=all[i][0],tn=all[i+1][0];
    const isLaid=LAID_MARKS.has(fn)||LAID_MARKS.has(tn);
    legWW.push(windFromDeg!==null?isWindwardLeg(fn,tn,windFromDeg,isLaid):false);
  }

  // Build the return leg (lap[last] -> lap[0]) for display
  // Only show if lap has ≥2 marks and last≠first mark position
  const lapFirst=course.lap[0][0], lapLast=course.lap[course.lap.length-1][0];
  const showReturnLeg=course.lap.length>=2&&lapFirst!==lapLast&&MARKS[lapFirst]&&MARKS[lapLast];
  const returnPtA=showReturnLeg?xy(MARKS[lapLast]):null;
  const returnPtB=showReturnLeg?xy(MARKS[lapFirst]):null;
  const returnIsWW=showReturnLeg&&windFromDeg!==null?
    isWindwardLeg(lapLast,lapFirst,windFromDeg,LAID_MARKS.has(lapLast)||LAID_MARKS.has(lapFirst)):false;

  // N indicator
  ctx.fillStyle="rgba(255,255,255,.35)";
  ctx.font=`bold ${large?22:7}px sans-serif`;
  ctx.textAlign="left";
  ctx.fillText("N↑",8,large?18:10);

  // Draw each leg individually so windward legs can be styled differently
  const lw=large?2.5:1.5;
  for(let i=0;i<pts.length-1;i++){
    if(!pts[i]||!pts[i+1])continue;
    const ww=legWW[i];
    ctx.beginPath();
    ctx.moveTo(pts[i][0],pts[i][1]);
    ctx.lineTo(pts[i+1][0],pts[i+1][1]);
    if(ww){
      // Windward leg — bright amber/gold with glow effect via double stroke
      ctx.strokeStyle=large?"rgba(255,200,60,.25)":"rgba(255,200,60,.2)";
      ctx.lineWidth=large?8:5;
      ctx.lineJoin="round";ctx.lineCap="round";
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pts[i][0],pts[i][1]);
      ctx.lineTo(pts[i+1][0],pts[i+1][1]);
      ctx.strokeStyle=large?"rgba(255,185,30,.95)":"rgba(255,185,30,.85)";
      ctx.lineWidth=large?2.5:1.8;
      ctx.stroke();
    } else {
      ctx.strokeStyle="rgba(91,181,232,.7)";
      ctx.lineWidth=lw;
      ctx.lineJoin="round";ctx.lineCap="round";
      ctx.stroke();
    }
  }

  // Draw return leg (lap[last]→lap[0]) as dashed line
  if(showReturnLeg&&returnPtA&&returnPtB){
    ctx.save();
    ctx.setLineDash(large?[6,4]:[3,3]);
    ctx.lineCap="round";
    if(returnIsWW){
      // Windward return — amber glow + solid amber dashed
      ctx.strokeStyle="rgba(255,200,60,.15)";ctx.lineWidth=large?7:4;
      ctx.beginPath();ctx.moveTo(returnPtA[0],returnPtA[1]);ctx.lineTo(returnPtB[0],returnPtB[1]);ctx.stroke();
      ctx.strokeStyle="rgba(255,185,30,.8)";ctx.lineWidth=large?2:1.5;
      ctx.beginPath();ctx.moveTo(returnPtA[0],returnPtA[1]);ctx.lineTo(returnPtB[0],returnPtB[1]);ctx.stroke();
    } else {
      ctx.strokeStyle="rgba(91,181,232,.45)";ctx.lineWidth=large?2:1.2;
      ctx.beginPath();ctx.moveTo(returnPtA[0],returnPtA[1]);ctx.lineTo(returnPtB[0],returnPtB[1]);ctx.stroke();
    }
    ctx.setLineDash([]);
    // Direction tick on return leg midpoint
    const mx=(returnPtA[0]+returnPtB[0])/2,my=(returnPtA[1]+returnPtB[1])/2;
    const ang=Math.atan2(returnPtB[1]-returnPtA[1],returnPtB[0]-returnPtA[0]),tl=large?7:3.5;
    ctx.strokeStyle=returnIsWW?"rgba(255,185,30,.55)":"rgba(91,181,232,.35)";
    ctx.lineWidth=large?2:1;
    ctx.translate(mx,my);ctx.rotate(ang);
    ctx.beginPath();ctx.moveTo(-tl,-tl/1.6);ctx.lineTo(0,0);ctx.lineTo(-tl,tl/1.6);ctx.stroke();
    ctx.restore();

    // Distance label on windward return leg — large view only
    if(large&&returnIsWW){
      const ma=MARKS[lapLast],mb=MARKS[lapFirst];
      if(ma&&mb){
        const distNm=hav(ma,mb),lbl=distNm.toFixed(2)+" nm";
        const ax=returnPtA[0],ay=returnPtA[1],bx=returnPtB[0],by=returnPtB[1];
        const dx=bx-ax,dy=by-ay,len=Math.sqrt(dx*dx+dy*dy);
        const nx=-dy/len,ny=dx/len,off=14;
        const lx=(ax+bx)/2+nx*off,ly=(ay+by)/2+ny*off;
        ctx.save();
        ctx.font="bold 18px 'Barlow Condensed',sans-serif";
        ctx.textAlign="center";ctx.textBaseline="middle";
        const tw=ctx.measureText(lbl).width,ph=22,pw=tw+10;
        ctx.fillStyle="rgba(8,16,32,.78)";
        roundRect(ctx,lx-pw/2,ly-ph/2,pw,ph,4);ctx.fill();
        ctx.strokeStyle="rgba(255,185,30,.55)";ctx.lineWidth=0.8;
        roundRect(ctx,lx-pw/2,ly-ph/2,pw,ph,4);ctx.stroke();
        ctx.fillStyle="#ffca3a";ctx.fillText(lbl,lx,ly+0.5);
        ctx.restore();
      }
    }
  }
  for(let i=0;i<pts.length-1;i++){
    if(!pts[i]||!pts[i+1])continue;
    const ax=pts[i][0],ay=pts[i][1],bx=pts[i+1][0],by=pts[i+1][1];
    const mx=(ax+bx)/2,my=(ay+by)/2,ang=Math.atan2(by-ay,bx-ax),tl=large?7:3.5;
    const ww=legWW[i];
    ctx.save();
    ctx.strokeStyle=ww?"rgba(255,185,30,.6)":"rgba(91,181,232,.4)";
    ctx.lineWidth=large?2:1;
    ctx.translate(mx,my);ctx.rotate(ang);
    ctx.beginPath();ctx.moveTo(-tl,-tl/1.6);ctx.lineTo(0,0);ctx.lineTo(-tl,tl/1.6);ctx.stroke();
    ctx.restore();

    // Distance label on windward legs — large view only
    if(large&&ww){
      const fn=all[i][0],tn=all[i+1][0];
      const ma=MARKS[fn],mb=MARKS[tn];
      if(ma&&mb){
        const distNm=hav(ma,mb);
        const lbl=distNm.toFixed(2)+" nm";
        const dx=bx-ax,dy=by-ay,len=Math.sqrt(dx*dx+dy*dy);
        // Perpendicular offset — push label to the left of travel direction
        const nx=-dy/len,ny=dx/len;
        const off=14;
        const lx=mx+nx*off, ly=my+ny*off;
        ctx.save();
        ctx.font="bold 18px 'Barlow Condensed',sans-serif";
        ctx.textAlign="center";ctx.textBaseline="middle";
        const tw=ctx.measureText(lbl).width;
        // Pill background
        ctx.fillStyle="rgba(8,16,32,.78)";
        const ph=24,pw=tw+12;
        roundRect(ctx,lx-pw/2,ly-ph/2,pw,ph,4);
        ctx.fill();
        // Amber border
        ctx.strokeStyle="rgba(255,185,30,.55)";ctx.lineWidth=0.8;
        roundRect(ctx,lx-pw/2,ly-ph/2,pw,ph,4);
        ctx.stroke();
        // Text
        ctx.fillStyle="#ffca3a";
        ctx.fillText(lbl,lx,ly+0.5);
        ctx.restore();
      }
    }
  }

  // Mark dots — NO labels except S/F for orientation
  const dotR=large?7:3,endR=large?9:4.5;
  all.forEach((m,i)=>{
    const coord=MARKS[m[0]];if(!coord)return;
    const[x,y]=xy(coord),side=m[1],isEnd=i===0||i===all.length-1;
    ctx.beginPath();ctx.arc(x,y,isEnd?endR:dotR,0,Math.PI*2);
    ctx.fillStyle=isEnd?"#e8a020":side==="P"?"#e87070":"#5ecb80";ctx.fill();
    // Only S/F label (start mark only, i===0) — no other mark labels
    if(isEnd&&i===0){
      ctx.save();
      if(large){
        const lbl="S/F";
        const lx=x+endR+5,ly=y+4;
        ctx.font="bold 20px 'Barlow Condensed',sans-serif";
        ctx.textAlign="left";ctx.textBaseline="middle";
        const tw=ctx.measureText(lbl).width;
        ctx.fillStyle="rgba(8,16,32,.72)";
        ctx.fillRect(lx-2,ly-9,tw+4,16);
        ctx.fillStyle="#e8a020";
        ctx.fillText(lbl,lx,ly);
      } else {
        ctx.fillStyle="rgba(232,160,32,.65)";ctx.font="bold 6px sans-serif";
        ctx.fillText("S/F",x+5,y+2.5);
      }
      ctx.restore();
    }
  });

  // Wind arrow — top-right corner
  if(large&&windDir!==null){
    const bx=W-windBoxW+8, by=14;
    const bw=windBoxW-10, bh=80;
    const cx2=bx+bw/2, cy2=by+bh/2;
    const arrowLen=28;
    const rad=windDir*Math.PI/180;
    const tx2=cx2+arrowLen*Math.sin(rad), ty2=cy2-arrowLen*Math.cos(rad);
    const ex2=cx2-arrowLen*Math.sin(rad), ey2=cy2+arrowLen*Math.cos(rad);
    ctx.strokeStyle="rgba(232,160,32,.9)";ctx.lineWidth=3;ctx.lineCap="round";
    ctx.beginPath();ctx.moveTo(tx2,ty2);ctx.lineTo(ex2,ey2);ctx.stroke();
    const ddx=ex2-tx2,ddy=ey2-ty2,dist=Math.sqrt(ddx*ddx+ddy*ddy);
    const ux=ddx/dist,uy=ddy/dist,vx=-uy,vy=ux,hl=11,hw=6;
    const hx2=ex2-ux*hl,hy2=ey2-uy*hl;
    ctx.beginPath();ctx.moveTo(ex2,ey2);
    ctx.lineTo(hx2+vx*hw,hy2+vy*hw);ctx.lineTo(hx2-vx*hw,hy2-vy*hw);
    ctx.closePath();ctx.fillStyle="#e8a020";ctx.fill();
    ctx.beginPath();ctx.arc(tx2,ty2,4,0,Math.PI*2);
    ctx.fillStyle="rgba(232,160,32,.35)";ctx.fill();
    ctx.strokeStyle="#e8a020";ctx.lineWidth=1.5;ctx.stroke();
    // "WIND" label above direction
    ctx.font="bold 18px 'Barlow Condensed',sans-serif";
    ctx.fillStyle="rgba(232,160,32,.55)";ctx.textAlign="center";
    ctx.fillText("WIND",cx2,by-2);
    // Direction — cardinal on first line, degrees on second line
    ctx.font="bold 28px 'Barlow Condensed',sans-serif";
    ctx.fillStyle="#e8a020";
    ctx.fillText(degToCard(windDir),cx2,by+bh+18);
    ctx.font="bold 22px 'Barlow Condensed',sans-serif";
    ctx.fillStyle="rgba(232,160,32,.75)";
    ctx.fillText(Math.round(windDir)+"°",cx2,by+bh+40);
    // Wind speed (mean kts)
    if(windKts!==null&&windKts!==undefined){
      ctx.font="bold 28px 'Barlow Condensed',sans-serif";
      ctx.fillStyle="#ffffff";
      ctx.fillText(windKts+"kt",cx2,by+bh+62);
    }
    // Gust
    if(windGust!==null&&windGust!==undefined){
      ctx.font="bold 20px 'Barlow Condensed',sans-serif";
      ctx.fillStyle="#e07070";
      ctx.fillText("Gust "+windGust,cx2,by+bh+86);
    }
  }
}

// Rounded rect helper (no Path2D for compatibility)
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

      <div class="ovl-stat-val">${wwPct}<span class="ovl-stat-unit">%</span></div>
      <div style="font-size:22px;color:#5ecb80;margin-top:4px;">${totalWWnm.toFixed(2)} nm</div></div>`:""}
    <div class="ovl-stat"><div class="ovl-stat-lbl">Avg speed</div>

    let cls="mk ";
    if(isEnd)cls+="mk-end";else if(side==="P")cls+="mk-P";else cls+="mk-S";
    if(!isEnd&&isInitial)cls+=" mk-once";
    const label=(isEnd?"S/F":name)+(side&&!isEnd?` (${side})`:"");
    const arrow=i<c.marks.length-1?'<span class="mk-arr">›</span>':"";
    return`<span class="${cls}">${label}</span>${arrow}`;

  const marksEl=document.getElementById("ovlMarksDetail");
  if(marksEl)marksEl.innerHTML=marksHtml;

  document.getElementById("overlay").classList.add("open");

  // Double rAF ensures layout is fully settled before reading dimensions
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const wrap=document.querySelector(".overlay-canvas-wrap");

    ctx.setTransform(1,0,0,1,0,0); // reset any previous transform

    drawCourseMap(cv,c,selWind,true,BAND_LABEL[getWindBand()],fcStartData?fcStartData.kts:null,fcStartData?fcStartData.gust:null);
  }));
}

// ─────────────────────────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────────────────────────
function render(){
  const tide=document.getElementById("tide").value;
  const duration=parseInt(document.getElementById("duration").value);
  const selectedLens=getSelectedLengths();
  const windBand=getWindBand();
  const fleet=document.getElementById("fleet").value;
  const classEl=document.getElementById("boatClass");
  const classPY=classEl&&classEl.value?parseInt(classEl.value):NaN;
  const fleetKey=(fleet==="class"||!FLEET_MID_PY[fleet])?"medium":fleet;
  const effectivePY=!isNaN(classPY)?classPY:FLEET_MID_PY[fleetKey];
  const className=!isNaN(classPY)&&classEl.selectedOptions[0]?classEl.selectedOptions[0].text:"";

  const windFromDeg=selWind!==null?selWind:null;

  const el=document.getElementById("results");
  if(!selWind){
    el.innerHTML=`<div class="empty"><div class="empty-ico">🧭</div><h3>Select a wind direction</h3><p>Drag the compass dial below to set wind direction</p></div>`;
    return;
  }
  if(!selectedLens.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">⚓</div><h3>No course types selected</h3><p>Tick at least one course length above.</p></div>`;
    return;
  }

  const slow=fleet==="slow";
  // Get courses for the wind direction, including boundary blending
  function getWindCandidates(deg){
    if(deg===null||deg===undefined) return [];
    const BOUNDARY=5; // degrees — if within this of a zone boundary, include both zones
    const zoneDeg=22.5; // each of 16 zones spans 22.5°
    // Find primary zone
    const card=degToCard(deg);
    let courses=[...(WIND_MAP[card]||[])];
    // Check distance to zone boundary
    const cardDeg=DIR_DEGS[card];
    let diff=((deg-cardDeg)+360)%360;
    if(diff>180) diff=360-diff;
    // diff is degrees from zone centre (0=centre, 11.25=boundary)
    const distToBoundary=11.25-diff; // negative means past boundary
    if(Math.abs(diff-11.25)<=BOUNDARY){
      // Near a boundary — find which neighbour and add their courses
      const idx2=DIRS.indexOf(card);
      const neighbour=diff>11.25?DIRS[(idx2+1)%16]:DIRS[(idx2+15)%16];
      const extra=WIND_MAP[neighbour]||[];
      extra.forEach(function(c){if(!courses.includes(c))courses.push(c);});
    }
    return courses;
  }
  const candidates=(getWindCandidates(selWind)||[]).filter(l=>{
    const c=COURSES[l];if(!c)return false;
    if(slow&&(c.type==="MC"||c.type==="LC"))return false;
    if(!selectedLens.includes(c.type))return false;
    if(c.hwOnly&&tide!=="hw")return false;
    if(c.avoidLW&&tide==="lw")return false;
    return true;
  });

  if(!candidates.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">⚓</div><h3>No courses available</h3><p>No courses match the selected conditions.</p></div>`;
    return;
  }

  const scored=candidates.map(l=>{
    const c=COURSES[l];
    const{lapOneway,returnDist,initDist,finalDist}=calcDists(c);
    const lapDist=lapOneway+returnDist;
    const{wwLapNm,wwOncNm,wwLegsPerLap,wwLegsOnce,wwLapOnewayNm,wwReturnNm}=calcWindwardLegs(c,windFromDeg);
    function bestLaps(spd){
      const targetNm=spd*(duration/60);
      const raw=(targetNm-initDist-finalDist)/(lapOneway+returnDist);
      const lo=Math.max(1,Math.floor(raw)); const hi=Math.min(6,Math.ceil(raw));
      if(lo===hi)return lo;
      const tLo=((initDist+lo*lapOneway+(lo-1)*returnDist+finalDist)/spd)*60;
      const tHi=((initDist+hi*lapOneway+(hi-1)*returnDist+finalDist)/spd)*60;
      return Math.abs(tLo-duration)<=Math.abs(tHi-duration)?lo:hi;
    }
    const spd1=courseSpeed(fleet,windBand,0,effectivePY);
    const laps1=bestLaps(spd1);
    const totalNm1=initDist+laps1*lapOneway+(laps1-1)*returnDist+finalDist;
    const totalWWnm1=wwOncNm+laps1*wwLapOnewayNm+(laps1-1)*wwReturnNm;
    const wwFrac1=totalNm1>0?totalWWnm1/totalNm1:0.38;
    const spd2=courseSpeed(fleet,windBand,wwFrac1,effectivePY);
    const laps=bestLaps(spd2); const speed=spd2;
    const totalNm=initDist+laps*lapOneway+(laps-1)*returnDist+finalDist;
    const timeMins=(totalNm/speed)*60;
    const racingNm=totalNm-initDist-finalDist;
    const lapTimeMins=laps>0?(racingNm/laps/speed)*60:0;
    const totalWWnm=wwOncNm+laps*wwLapOnewayNm+(laps-1)*wwReturnNm;
    const wwPct=totalNm>0?Math.round((totalWWnm/totalNm)*100):0;
    // Per-fleet laps + times for course list rows
    function _rowFL(fk){
      var _py=FLEET_MID_PY[fk]||1104;
      var _sp=courseSpeed(fk,windBand,wwFrac1>0?wwFrac1:0.38,_py);
      var _tg=_sp*(duration/60);
      var _rw=(_tg-initDist-finalDist)/(lapOneway+returnDist);
      var _lo=Math.max(1,Math.floor(_rw)),_hi=Math.min(6,Math.ceil(_rw));
      var _l=_lo===_hi?_lo:(
        ((initDist+_lo*lapOneway+(_lo-1)*returnDist+finalDist)/_sp*60>=duration)?_lo:_hi);
      var _tot=initDist+_l*lapOneway+(_l-1)*returnDist+finalDist;
      return{laps:_l,mins:Math.round(_tot/_sp*60)};
    }
    var rowFast=_rowFL('fast'),rowMed=_rowFL('medium'),rowSlow=_rowFL('slow');
    return{l,c,lapDist,lapOneway,returnDist,initDist,finalDist,laps,totalNm,timeMins,lapTimeMins,
      diff:Math.abs(timeMins-duration),totalWWnm,wwPct,wwFrac:wwFrac1,wwLegsPerLap,wwLegsOnce,speed,
      rowFast,rowMed,rowSlow};
  });

  // Sort by windward % descending
  scored.sort((a,b)=>b.wwPct-a.wwPct||b.totalWWnm-a.totalWWnm);

  // Build compact rows: mini-canvas | letter+%WW+marks | laps+time only
  let html='';
  scored.forEach(function(s,idx){
    const lapSet=new Set(s.c.lap.map(function(m){return m[0]+'|'+m[1];}));
    const finalSet=new Set(s.c.final.map(function(m){return m[0]+'|'+m[1];}));
    const initialSet=new Set(s.c.initial.map(function(m){return m[0]+'|'+m[1];}));
    const warns=[];
    if(s.c.hwOnly)warns.push('HW only');
    if(s.c.avoidLW)warns.push('Avoid LW');
    const marksHtml=s.c.marks.map(function(m,i){
      const name=m[0],side=m[1];
      const isEnd=i===0||i===s.c.marks.length-1;
      const key=name+'|'+side;
      const isOnce=initialSet.has(key)&&!lapSet.has(key)&&!finalSet.has(key)&&!isEnd;
      let cls='cs-mk '+(isEnd?'cs-mk-e':side==='P'?'cs-mk-p':'cs-mk-s')+(isOnce?' cs-mk-once':'');
      const lbl=isEnd?'S/F':name;
      const arr=i<s.c.marks.length-1?'<span style="color:rgba(255,255,255,.18);font-size:18px;margin:0 1px;">›</span>':'';
      return '<span class="'+cls+'">'+lbl+'</span>'+arr;
    }).join('');
    const isBest=idx===0;
    html+='<div class="cs-row'+(isBest?' cs-best':'')+'" id="csrow_'+s.l+'"'
        +' data-letter="'+s.l+'" onclick="openCsMap(this.dataset.letter)">'
      +'<div class="cs-row-canvas"><canvas id="cv_'+s.l+'" width="74" height="97"></canvas></div>'
      +'<div class="cs-row-mid">'
        +'<div class="cs-row-letter">'+s.l+'<span class="cs-row-ww">⬆'+s.wwPct+'%</span></div>'
        +'<div class="cs-row-marks">'+marksHtml+'</div>'
      +'</div>'
      +'<div class="cs-row-right">'
        +'<div class="cs-row-laps">'+s.rowFast.laps+', '+s.rowMed.laps+', '+s.rowSlow.laps+' laps</div>'
        +'<div class="cs-row-time">'+s.rowFast.mins+', '+s.rowMed.mins+', '+s.rowSlow.mins+' min</div>'
        +(warns.length?'<div class="cs-row-warn">'+warns.join(' ')+'</div>':'')
      +'</div>'
    +'</div>';
  });

  // Cache scored for map popup access
  window.scored_cache=scored;

  el.innerHTML=html;

  // Draw mini canvases after DOM insert
  scored.forEach(function(s){
    const cv=document.getElementById('cv_'+s.l);
    if(!cv)return;
    const dpr=window.devicePixelRatio||1;
    cv.width=74*dpr; cv.height=97*dpr;
    cv.style.width='74px'; cv.style.height='97px';
    cv.style.cursor='pointer';

    ctx.scale(dpr,dpr);

  });

}

// Draw a mini course map on a small canvas
function drawMiniCourse(ctx,W,H,course,windDir){
  const SF=["START/FINISH",null];
  const fullSeq=[SF,...course.initial,...course.lap,...course.final,SF];
  const coords=fullSeq.map(function(m){return MARKS[m[0]];}).filter(Boolean);
  if(coords.length<2)return;
  const lats=coords.map(function(c){return c.lat;});
  const lons=coords.map(function(c){return c.lon;});
  const minLat=Math.min.apply(null,lats),maxLat=Math.max.apply(null,lats);
  const minLon=Math.min.apply(null,lons),maxLon=Math.max.apply(null,lons);
  const pad=5;
  const rangeX=maxLon-minLon, rangeY=maxLat-minLat;
  const scaleX=rangeX<1e-6?1:(W-pad*2)/rangeX;
  const scaleY=rangeY<1e-6?1:(H-pad*2)/rangeY;
  const sc=Math.min(scaleX,scaleY);
  const offX=(W-rangeX*sc)/2;
  const offY=(H-rangeY*sc)/2;
  function xy(m){
    var mk=MARKS[m[0]];if(!mk)return null;
    return[(mk.lon-minLon)*sc+offX, H-(mk.lat-minLat)*sc-offY];
  }
  // Determine windward legs by calling isWindwardLeg directly on each pair
  const windFromDeg=(windDir!==null&&windDir!==undefined)?windDir:null;
  // Draw all legs dashed first
  ctx.beginPath();
  var started=false;
  fullSeq.forEach(function(m){
    var p=xy(m);if(!p)return;
    if(!started){ctx.moveTo(p[0],p[1]);started=true;}else{ctx.lineTo(p[0],p[1]);}
  });
  ctx.strokeStyle='rgba(91,181,232,.38)';ctx.lineWidth=1;ctx.setLineDash([3,2]);ctx.stroke();
  ctx.setLineDash([]);
  // Overdraw windward legs solid gold using isWindwardLeg()
  for(var i=0;i<fullSeq.length-1;i++){
    var fn=fullSeq[i][0], tn=fullSeq[i+1][0];
    var pa=xy(fullSeq[i]), pb=xy(fullSeq[i+1]);
    if(!pa||!pb)continue;
    var isLaid=LAID_MARKS.has(fn)||LAID_MARKS.has(tn);
    if(windFromDeg!==null && isWindwardLeg(fn,tn,windFromDeg,isLaid)){
      ctx.beginPath();ctx.moveTo(pa[0],pa[1]);ctx.lineTo(pb[0],pb[1]);
      ctx.strokeStyle='rgba(255,185,30,.92)';ctx.lineWidth=2;ctx.stroke();
    }
  }
  // Dots — S/F amber, port red, stbd green
  fullSeq.forEach(function(m,i){
    var p=xy(m);if(!p)return;
    var isEnd=m[0]==='START/FINISH';
    var side=m[1];
    ctx.beginPath();ctx.arc(p[0],p[1],isEnd?3.5:2,0,Math.PI*2);
    ctx.fillStyle=isEnd?'#e8a020':side==='P'?'#e87070':'#5ecb80';
    ctx.fill();
  });
}

function getUKOffset(d){
  const y=d.getUTCFullYear();
  const bstStart=new Date(Date.UTC(y,2,31-(new Date(Date.UTC(y,2,31)).getUTCDay()),1,0,0));
  const bstEnd  =new Date(Date.UTC(y,9,31-(new Date(Date.UTC(y,9,31)).getUTCDay()),1,0,0));
  return d>=bstStart&&d<bstEnd?1:0;
}
function toUKLocalTime(d){return new Date(d.getTime()+getUKOffset(d)*3600000);}
function formatUKTime(d){
  const u=toUKLocalTime(d);
  return String(u.getUTCHours()).padStart(2,'0')+':'+String(u.getUTCMinutes()).padStart(2,'0');
}

function fcTidalState(t, events){
  const sorted=[...events].sort((a,b)=>a.time-b.time);
  const ms=t.getTime();
  for(const ev of sorted){
    const win=1800000; // HW and LW both ±30 min for display label
    if(Math.abs(ev.time.getTime()-ms)<win){
      return ev.type==='HighWater'
        ?{state:'hw',label:'High Water',cls:'tide-hw'}
        :{state:'lw',label:'Low Water',cls:'tide-lw'};
    }
  }
  let prev=null,next=null;
  for(const ev of sorted){
    if(ev.time.getTime()<=ms) prev=ev;
    if(ev.time.getTime()>ms && !next) next=ev;
  }
  if(!prev&&next) return next.type==='HighWater'?{state:'flood',label:'Flooding',cls:'tide-flood'}:{state:'ebb',label:'Ebbing',cls:'tide-ebb'};
  if(prev&&!next) return prev.type==='HighWater'?{state:'ebb',label:'Ebbing',cls:'tide-ebb'}:{state:'flood',label:'Flooding',cls:'tide-flood'};
  if(prev&&next){
    if(prev.type==='LowWater' &&next.type==='HighWater')return{state:'flood',label:'Flooding',cls:'tide-flood'};
    if(prev.type==='HighWater'&&next.type==='LowWater') return{state:'ebb',label:'Ebbing',cls:'tide-ebb'};
    if(prev.type==='HighWater'&&next.type==='HighWater')return{state:'hw',label:'HW Stand',cls:'tide-hw'};
    if(prev.type==='LowWater' &&next.type==='LowWater') return{state:'lw',label:'LW Stand',cls:'tide-lw'};
  }
  return{state:'unknown',label:'?',cls:''};
}

function fcEstStream(t, events){
  const sorted=[...events].sort((a,b)=>a.time-b.time);
  const ms=t.getTime();
  let prev=null,next=null;
  for(const ev of sorted){if(ev.time.getTime()<=ms)prev=ev;if(ev.time.getTime()>ms&&!next)next=ev;}
  if(!prev||!next)return 0.5;
  const total=(next.time-prev.time)/60000;
  const elapsed=(ms-prev.time.getTime())/60000;
  const rates=[1,2,3,3,2,1];
  const idx=Math.min(5,Math.floor((elapsed/total)*6));
  return+((rates[idx]/6)*2.0).toFixed(1);
}
